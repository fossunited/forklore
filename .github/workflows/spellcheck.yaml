name: cspell - Spell Check

on:
  pull_request:
  workflow_dispatch:

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run CSpell
        id: cspell
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: "./cspell.json"
          incremental_files_only: false
        continue-on-error: true

      - name: Report CSpell Failure
        if: steps.cspell.outcome == 'failure'
        run: |
          echo "::error::🛑 Spell check failed. Please fix the spelling issues listed above."
          echo "Is this a false error? Custom words can be added to '.cspell/maintainer-words.txt'"
          exit 1
