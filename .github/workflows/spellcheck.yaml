name: cspell - Spell Check

on:
  push:
    branches:
      - develop
  pull_request:

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Run CSpell
        uses: streetsidesoftware/cspell-action@v6
        with:
          config: "./cspell.json"
          incremental_files_only: false
